---
name: checkmake
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  checkmake:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: |
          bin=/usr/local/bin/checkmake
          ver=0.3.2
          srv=https://github.com/checkmake/checkmake/releases/download
          curl \
            --fail \
            --location \
            --output "$bin" \
            --show-error \
            --silent \
            "$srv/v$ver/checkmake-v$ver.linux.amd64"
          chmod +x "$bin"
          find . -path ./.git -prune -o \
            \( -name Makefile -o -name '*.mk' \) -print0 |
            xargs \
              --no-run-if-empty \
              --null \
              "$bin"
