---
name: test
'on':
  pull_request:
    paths: &paths
      - .github/workflows/test.yml
      - include/**
      - src/**
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - run: |
          if [ "$RUNNER_OS" = macOS ]; then
            brew install goredo
          fi
          cc \
            -Iinclude \
            -Wall \
            -Werror \
            -Wextra \
            -c \
            -o base.o \
            src/base.c
