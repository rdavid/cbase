---
name: actionlint
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - id: get
        run: |
          ver=1.7.12
          srv=https://raw.githubusercontent.com/rhysd/actionlint/v$ver/scripts
          bash <(curl --silent "$srv/download-actionlint.bash") "$ver"
      - run: ${{ steps.get.outputs.executable }}
