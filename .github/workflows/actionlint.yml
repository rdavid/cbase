---
name: actionlint
'on':
  pull_request:
    paths: &paths ['.github/workflows/**']
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - id: get
        run: |
          ver=1.7.12
          srv=https://raw.githubusercontent.com/rhysd/actionlint/v$ver/scripts
          curl \
            --fail \
            --output get.bash \
            --show-error \
            --silent \
            "$srv/download-actionlint.bash"
          bash get.bash "$ver"
      - run: ${{ steps.get.outputs.executable }}
